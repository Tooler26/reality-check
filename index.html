<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ktj Soccer Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 0; }
        header { background: #1f1f1f; padding: 1rem; border-bottom: 3px solid #2ecc71; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        
        /* The Video Box */
        .video-box { background: #000; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Score Widget Area */
        .score-board { margin-top: 20px; background: #1f1f1f; padding: 15px; border-radius: 8px; }
        .status-tag { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>⚽ SoccerLive<span style="color: #2ecc71;">Hub</span></h1>
</header>

<div class="container">
    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=YOUR_FAVORITE_SPORTS_CHANNEL" 
                allowfullscreen></iframe>
    </div>

    <div class="score-board">
        <h3><span class="status-tag">Live</span> Match Statistics</h3>
        <div id="score-container">
            <p>Loading live scores...</p>
            </div>
    </div>
</div>

</body>
</html>
